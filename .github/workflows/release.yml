name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            suffix: windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compiler (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get install -y gcc-mingw-w64-x86-64
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        run: |
          src="target/${{ matrix.target }}/release/rig"
          if [[ "${{ matrix.target }}" == *windows* ]]; then src="${src}.exe"; fi
          cp "$src" "rig-${VERSION}-${{ matrix.suffix }}"
      - uses: actions/upload-artifact@v4
        with:
          name: rig-${{ env.VERSION }}-${{ matrix.suffix }}
          path: rig-${{ env.VERSION }}-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "${VERSION}" \
            --generate-notes \
            rig-${VERSION}-*
