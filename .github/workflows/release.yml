name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rig-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            artifact: rig-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: rig-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rig-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compiler (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get install -y gcc-mingw-w64-x86-64
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        run: |
          src="target/${{ matrix.target }}/release/rig"
          if [[ "${{ matrix.target }}" == *windows* ]]; then src="${src}.exe"; fi
          cp "$src" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            rig-linux-x86_64 \
            rig-windows-x86_64.exe \
            rig-macos-x86_64 \
            rig-macos-aarch64
